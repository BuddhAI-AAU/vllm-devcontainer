version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pg-memory
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - vllm-net

volumes:
  pgdata:

networks:
  vllm-net:
    external: true
